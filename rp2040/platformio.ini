; SenseCAP Indicator RP2040 firmware
; Build:  pio run
; Flash:  pio run -t upload
; Serial: pio device monitor

[env:indicator_rp2040]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = seeed_indicator_rp2040
framework = arduino
board_build.core = earlephilhower

; RP2040 runs at 133 MHz by default, sufficient for sensor polling
; board_build.f_cpu = 133000000L

monitor_speed = 115200

lib_deps =
    bakercp/PacketSerial@^1.4.0
    sensirion/Sensirion I2C SEN5X@^0.3.0

build_flags =
    -DPKT_SEND_INTERVAL_MS=5000
